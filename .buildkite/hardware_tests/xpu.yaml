# BuildKite CI configuration for Intel XPU (GPU) hardware tests
# Tests vllm on Intel discrete GPU hardware (e.g., Arc, Data Center GPU)

steps:
  - label: ":intel: XPU - Build & Install"
    key: xpu-build
    agents:
      queue: intel-xpu
    commands:
      - echo "--- Building vllm for Intel XPU"
      - pip install --upgrade pip
      - pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/xpu
      - pip install -e ".[xpu]" --extra-index-url https://pytorch-extension.intel.com/release-whl/stable/xpu/us/
      - echo "--- Verifying XPU availability"
      - python -c "import torch; print('XPU available:', torch.xpu.is_available()); print('XPU device count:', torch.xpu.device_count())"
    timeout_in_minutes: 60
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - label: ":intel: XPU - Basic Inference Tests"
    key: xpu-inference
    depends_on: xpu-build
    agents:
      queue: intel-xpu
    commands:
      - echo "--- Running basic inference tests on XPU"
      - pytest tests/basic_correctness/test_basic_correctness.py -v
          --device xpu
          -x
          --timeout=300
    timeout_in_minutes: 60
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - label: ":intel: XPU - Engine Core Tests"
    key: xpu-engine
    depends_on: xpu-build
    agents:
      queue: intel-xpu
    commands:
      - echo "--- Running engine core tests on XPU"
      - pytest tests/engine/
          -v
          --device xpu
          -x
          --timeout=300
          -k "not test_beam_search"
    timeout_in_minutes: 60

  - label: ":intel: XPU - Quantization Tests"
    key: xpu-quantization
    depends_on: xpu-build
    agents:
      queue: intel-xpu
    commands:
      - echo "--- Running quantization tests on XPU"
      - pytest tests/quantization/
          -v
          --device xpu
          -x
          --timeout=300
          -k "int8 or int4"
    timeout_in_minutes: 90

  - label: ":intel: XPU - Distributed Tests (2 GPUs)"
    key: xpu-distributed
    depends_on: xpu-build
    agents:
      queue: intel-xpu-multi
    commands:
      - echo "--- Running distributed inference tests on XPU"
      - pytest tests/distributed/
          -v
          --device xpu
          -x
          --timeout=600
          -k "tp_size_2"
    timeout_in_minutes: 120
    soft_fail:
      - exit_status: 1
